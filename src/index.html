<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" type="text/css" href="index.css" />
</head>
<body>
<div class="popup-container">
  <div class="popup-header">
    <div class="logo"><span class="alt">Lean</span>Rabbook</div>
  </div>

  <button class="popup-btn" id="readpage">
    <span class="btn-icon read">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
    </span>
    <span class="btn-text">
      <span class="btn-label">阅读本页</span>
      <span class="btn-desc">解析当前页面并进入阅读模式</span>
    </span>
  </button>

  <button class="popup-btn" id="bookmarktree">
    <span class="btn-icon bookmark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
    </span>
    <span class="btn-text">
      <span class="btn-label">书签与配置</span>
      <span class="btn-desc">管理阅读记录和扩展设置</span>
    </span>
  </button>

  <div class="popup-footer">
    <span class="version" id="version-label">LeanRabbook</span>
  </div>
</div>
<div id="ribbon"></div>
<script type="module" src="index.js"></script>
</body>
</html>
